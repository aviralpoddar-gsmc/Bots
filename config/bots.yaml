  # then flip enabled:true. Mint @CocoaAtlanticBot at go-live; for a dry-run point
  # account_env at an existing key (e.g. COCOA_FUNDAMENTAL_1_API_KEY).
  - name: cocoa_atlantic_1
    strategy: cocoa_atlantic
