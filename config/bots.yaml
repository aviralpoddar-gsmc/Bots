# Per-bot configuration. The framework reads this; bot authors edit it.
#
# - strategy:    a name registered in quantbots/strategies/__init__.py REGISTRY
# - account_env: env var holding THIS bot's Manifold-clone API key (never the key
#                itself). Defaults to MANIFOLD_CLONE_API_KEY.
# - limits:      sizing caps; anything omitted falls back to sizing.DEFAULT_LIMITS
# - params:      passed as **kwargs to the Strategy constructor

bots:
  - name: mean_reverter
    strategy: mean_reversion
    account_env: MANIFOLD_CLONE_API_KEY
    enabled: true
    limits:
      max_order_size: 25
      liquidity_pct: 0.25
      hold_band: 0.05
    params:
      alpha: 0.2

  - name: surface_arb_1
    strategy: surface_arb
    account_env: MANIFOLD_CLONE_API_KEY
    enabled: true
    limits:
      max_order_size: 50
      liquidity_pct: 0.33
      hold_band: 0.05
      max_price_impact: 0.10
      min_order_mana: 5

  # Fuses ingested observations (prices/macro) into a fair value, then trades the
  # gap. Run `quantbots ingest` first so there's data to fuse.
  - name: ensemble_1
    strategy: ensemble
    account_env: ENSEMBLE_1_API_KEY   # own account: @EnsembleBot
    enabled: true
    limits:
      max_order_size: 25
      hold_band: 0.05
    params:
      annual_vol: 0.3      # global fallback; scaled by sqrt(time-to-close) per market
      entity_vol:          # per-asset vols calibrated by `quantbots backtest`
        FRED_MORTGAGE30US: 0.15   # backtested: Brier skill +41%, calib err 0.03
        FRED_HOUST1F: 0.20        # backtested: skill +17%, calib err 0.03
      source_weights:      # trust per source when averaging signals
        stooq: 1.0
        fred: 1.0
        worldbank: 1.0

  # Climate bot — ENSO / Oceanic Niño Index (NOAA). Gaussian persistence model.
  - name: enso_1
    strategy: enso
    account_env: MANIFOLD_CLONE_API_KEY
    enabled: true
    limits:
      max_order_size: 25
      hold_band: 0.05
    params:
      monthly_vol: 0.25   # ONI per-month change vol; scaled by sqrt(months-to-close)

  # Soft-commodities bot — ICE/CBOT ag futures prices (Stooq). Lognormal model.
  - name: commodity_1
    strategy: commodity_futures
    account_env: MANIFOLD_CLONE_API_KEY
    enabled: true
    limits:
      max_order_size: 25
      hold_band: 0.05
    params:
      annual_vol: 0.30    # soft-commodity annualized vol; scaled by sqrt(years-to-close)

  # Data-anchored spot-price bot: gold/silver/copper/WTI/Brent threshold ladders.
  # Strict matcher + per-commodity unit conversion (see commodity_spot.py). Backtested
  # on FRED daily history: Brier skill +0.10..+0.29, win 77-84%, simulated ROI +57..71%.
  - name: commodity_spot_1
    strategy: commodity_spot
    account_env: COMMODITY_SPOT_1_API_KEY   # own account: @CommoditySpotBot
    enabled: true
    limits:
      # Size to liquidity and only NUDGE prices — scale comes from breadth (many
      # markets), not from slamming any one market. Repeated runs converge a
      # mispriced market toward fair value a few points at a time.
      max_order_size: 100     # per-market hard ceiling
      liquidity_pct: 0.25      # primary size driver: take at most 1/4 of a market's liquidity
      max_price_impact: 0.05   # never move a single market's price more than 5 points per run
      hold_band: 0.05
      max_run_budget: 50000    # generous; lets liquidity/impact caps govern size, not the budget
      per_group_pct: 0.30      # no single commodity gets >30% of the book (correlation cap)
      min_ev: 0.05             # only fund orders with >5% expected profit per mana
      dry_run_sample: 25       # how many orders to validate in dry-run
      # Across-run exposure ceilings — bound CUMULATIVE position over repeated live
      # runs (balance ~Ṁ360k). Stops the bot deploying unbounded capital into a
      # stubborn market that other traders keep pushing back.
      max_total_exposure: 18000   # ~5% of balance across all commodity_spot positions
      max_group_exposure: 5000    # ~1.4% of balance in any one commodity
    params:
      min_vol: 0.05
      vols:                 # realized annual vols (FRED daily); scaled by sqrt(years-to-close)
        GOLD: 0.16
        SILVER: 0.30
        PLATINUM: 0.22
        PALLADIUM: 0.30
        COPPER: 0.21        # backtested-family model; copper feed is cents/lb -> $/MT
        WTI_OIL: 0.40
        BRENT_OIL: 0.39
        GASOLINE: 0.45

  # Monte-Carlo stochastic-diffusion pricer (SAME markets as commodity_spot_1, fat-tail
  # pricing). Subclasses commodity_spot but prices each strike off a block-bootstrap
  # simulation of historical daily returns instead of the closed-form lognormal —
  # capturing jumps/fat tails on far-from-spot strikes. Pure numpy; needs the `research`
  # extra (yfinance history); falls back to lognormal per-commodity if history is missing.
  # ⚠️ enabled:false — BACKTEST GATE RUN 2026-06-03 (GOLD+WTI, 5y monthly, 3mo horizon):
  # diffusion is marginally better-CALIBRATED (Brier GOLD 0.0765->0.0754, WTI 0.1205->
  # 0.1170) but PnL is a WASH (ROI GOLD tie 0.891; WTI slightly worse 0.805->0.797) —
  # and the comparison is LOOKAHEAD-inflated (calibrated on full history), so the real
  # walk-forward edge is smaller still. Verdict: tail-only, not a meaningful edge over
  # the closed-form lognormal -> stays DISABLED (built + validated, correctly parked).
  # Trades the IDENTICAL strikes as commodity_spot_1 (own account, no commingled
  # exposure). Revisit only with a walk-forward recalibration or on a fatter-tailed
  # commodity. Mint @DiffusionMcBot at go-live; dry-run via COMMODITY_SPOT_1_API_KEY.
  - name: diffusion_mc_1
    strategy: diffusion_mc
    account_env: DIFFUSION_MC_1_API_KEY   # own account: @DiffusionMcBot (mint at go-live)
    enabled: false
    limits:
      max_order_size: 100
      liquidity_pct: 0.25
      max_price_impact: 0.05
      hold_band: 0.05
      max_run_budget: 50000
      per_group_pct: 0.30
      min_ev: 0.05
      dry_run_sample: 25
      max_total_exposure: 18000
      max_group_exposure: 5000
    params:
      period: 3y               # yfinance history window for calibration (cached pickles)
      n_sims: 20000            # MC paths (SE ~0.0035 << hold_band; fixed-seed deterministic)
      block_len: 10            # bootstrap block (trading days) — preserves vol clustering
      min_returns: 250         # need >=1y of returns to calibrate; else lognormal fallback
      min_vol: 0.05
      vols:                    # used only for the lognormal fallback + comment reference
        GOLD: 0.16
        SILVER: 0.30
        PLATINUM: 0.22
        PALLADIUM: 0.30
        COPPER: 0.21
        WTI_OIL: 0.40
        BRENT_OIL: 0.39
        GASOLINE: 0.45

  # Convergence overlay: commodity_spot's lognormal + a mean-reversion drift from
  # a currently-dislocated cointegrated pair (β / spread / OU half-life fit by the
  # research layer from cached yfinance history). Fires only on legs of pairs
  # stretched past entry_z — bets the rich leg down, the cheap leg up. Requires
  # the `research` extra. Shares commodity_spot's strict unit/price guards, so it
  # only ever touches genuine, resolvable spot-price strikes.
  # NOTE: enabled:false until a human confirms go-live — daily_cycle.sh runs every
  # enabled bot --live. Validate first: `quantbots run --bot pair_trading_1` (dry-run).
  # Overlaps commodity_spot_1 on the same legs (it's a drift-tilted refinement);
  # consider a separate account or disabling commodity_spot on dislocated legs.
  - name: pair_trading_1
    strategy: pair_trading
    account_env: PAIR_TRADING_1_API_KEY   # own account: @PairTradingBot
    enabled: true
    limits:
      max_order_size: 75       # per-market hard ceiling
      liquidity_pct: 0.25      # primary size driver: at most 1/4 of a market's liquidity
      max_price_impact: 0.05   # never move a single market's price >5 points per run
      hold_band: 0.05
      max_run_budget: 30000    # liquidity/impact caps govern size, not the budget
      per_group_pct: 0.40      # focused book (few dislocated pairs) -> allow more per commodity
      min_ev: 0.05             # only fund orders with >5% expected profit per mana
      min_resolvability: 0.04  # belt-and-braces; legs are already resolvable metals/energy
      dry_run_sample: 25
      max_total_exposure: 12000   # ~3% of balance across all pair_trading positions
      max_group_exposure: 4000    # cap per commodity
    params:
      entry_z: 1.5             # only trade a leg when its pair is dislocated past this
      reversion_capture: 0.5   # fraction of modelled reversion attributed to the priced leg
      max_half_life_days: 90   # ignore pairs that revert too slowly to matter
      min_abs_corr: 0.4        # drop spurious (low-correlation) "mean-reverters"
      period: 3y               # yfinance history window for the cointegration fit
      lookback_days: 750       # business-day window after alignment
      vols:                    # marginal annual vols (shared with commodity_spot)
        GOLD: 0.16
        SILVER: 0.30
        PLATINUM: 0.22
        PALLADIUM: 0.30
        COPPER: 0.21
        WTI_OIL: 0.40
        BRENT_OIL: 0.39
        GASOLINE: 0.45

  # Structural arbitrage: model-free monotonicity coherence across ALL numeric
  # ladders (domain-agnostic — production, demand, price, spread, ...). Trades the
  # ~2k ladders with provable monotonicity violations toward an isotonic-fit fair
  # value. Gentle, liquidity-aware sizing; per-ladder concentration caps.
  - name: ladder_arb_1
    strategy: ladder_arb
    account_env: LADDER_ARB_1_API_KEY   # own account: @LadderArbBot
    enabled: true
    limits:
      max_order_size: 50
      liquidity_pct: 0.25      # size to liquidity; nudge, don't slam
      max_price_impact: 0.05
      hold_band: 0.05
      max_run_budget: 50000    # generous; liquidity/impact caps govern per-order size
      per_group_pct: 0.05      # no single ladder gets >5% of the book (many ladders)
      min_ev: 0.05             # gates on REALIZED EV (paper EV x resolvability)
      min_resolvability: 0.04  # skip production/demand ladders that ~never resolve YES/NO
      dry_run_sample: 25
      max_total_exposure: 18000   # ~5% of balance across all ladder_arb positions
      max_group_exposure: 1000    # cap per individual ladder
    params:
      dev_band: 0.03           # treat |prob-0.5|>this (or any volume) as informative
      informative_weight: 5.0
      min_strikes: 3

  # Term-structure (time) coherence: same metric+threshold across resolution dates
  # must trace a smooth curve in time. Pulls stale 0.50 dates toward the value their
  # traded time-neighbours imply (kernel smoother, informative-weighted). Orthogonal
  # axis to ladder_arb (which works across thresholds on one date).
  - name: term_structure_1
    strategy: term_structure
    account_env: TERM_STRUCTURE_1_API_KEY   # own account: @TermStructureBot
    enabled: true
    limits:
      max_order_size: 50
      liquidity_pct: 0.25
      max_price_impact: 0.05
      hold_band: 0.05
      max_run_budget: 50000
      per_group_pct: 0.05       # no single term-structure curve gets >5% of the book
      min_ev: 0.05              # gates on REALIZED EV (paper EV x resolvability)
      min_resolvability: 0.04   # skip production/demand curves that ~never resolve YES/NO
      dry_run_sample: 25
      max_total_exposure: 18000   # ~5% of balance
      max_group_exposure: 1000    # cap per metric+threshold curve
    params:
      bandwidth: 6.0            # months; Gaussian kernel width over resolution dates
      dev_band: 0.03
      informative_weight: 5.0
      min_dates: 3
      min_anchors: 2
      skip_extreme: 0.02

  # === U.S. strategic-materials market family (3 bots, disjoint ownership) ===

  # #1 Reference-lookup FACT bot: prices "on the Critical Minerals list" off the
  # USGS 2022 list (sticky, statutory) and "NDS holds a position" off documented
  # DLA/GAO holdings — high conviction where the market sits at a coin-flip but the
  # published fact is known; abstains where the record is ambiguous. The real alpha
  # of the three (genuine resolvability + 36-40pt edges). Curated tables in
  # stockpile_facts.py — refresh when USGS/DLA publish.
  - name: stockpile_facts_1
    strategy: stockpile_facts
    account_env: STOCKPILE_FACTS_1_API_KEY   # own account: @StockpileFactsBot
    enabled: true
    limits:
      # These are high-conviction FACT bets (40pt gaps) on thin seeded markets, so
      # we push hard toward fair value rather than nudge. max_price_impact is large
      # so the 1/3-per-run sizing (not the impact cap) governs; repeated daily runs
      # converge each market and min_ev/hold_band stop them at fair value.
      max_order_size: 200
      liquidity_pct: 0.50
      max_price_impact: 0.40     # was 0.05 — that throttled orders to ~Ṁ5 on liq-100 markets
      hold_band: 0.05
      max_run_budget: 30000
      per_group_pct: 0.20
      min_ev: 0.05               # stops pushing once realized edge (paper×resolvability) thins
      min_resolvability: 0.04    # NDS=0.35, list=0.90 both clear this; nothing else trades
      dry_run_sample: 25
      max_total_exposure: 25000    # room to fully fund all ~22 markets to fair value
      max_group_exposure: 3000     # cap per metal

  # #2 Vault kg-ladder 2-D structural arb (↓ strike, ↑ expiry). Cancel-safe: these
  # quantity markets resolve ~never (resolvability 0.03), so realized EV is small —
  # deployed as a small free option that activates when traders dislocate a grid.
  # hold_band gates on a >5pt deviation; min_resolvability 0 lets it act despite
  # low resolution odds; tiny caps bound the tied-up (refundable) capital.
  - name: stockpile_grid_arb_1
    strategy: stockpile_grid_arb
    account_env: STOCKPILE_GRID_ARB_1_API_KEY   # own account: @StockpileGridArbBot
    enabled: true
    limits:
      max_order_size: 30
      liquidity_pct: 0.20
      max_price_impact: 0.05
      hold_band: 0.05            # only trade strikes off the surface by >5pts
      max_run_budget: 5000
      per_group_pct: 0.10
      min_ev: 0.0               # cancel-safe arb: refund downside, so low realized EV is fine
      min_resolvability: 0.0    # do NOT filter on the ~0.03 resolvability here
      dry_run_sample: 25
      max_total_exposure: 3000     # small: capital is mostly refunded, opportunity-cost only
      max_group_exposure: 500
    params:
      dev_band: 0.03
      informative_weight: 5.0
      min_nodes: 4

  # #3 Cross-template TIME-coherence on cumulative "by-date" markets (Project-Vault
  # inclusion + buffer-stock). Hard monotonicity (PAVA): a cumulative event can't
  # get less likely later. Same cancel-safe small-option profile as #2.
  - name: stockpile_coherence_1
    strategy: stockpile_coherence
    account_env: STOCKPILE_COHERENCE_1_API_KEY   # own account: @StockpileCoherenceBot
    enabled: true
    limits:
      max_order_size: 30
      liquidity_pct: 0.20
      max_price_impact: 0.05
      hold_band: 0.05
      max_run_budget: 5000
      per_group_pct: 0.10
      min_ev: 0.0
      min_resolvability: 0.0
      dry_run_sample: 25
      max_total_exposure: 3000
      max_group_exposure: 500
    params:
      dev_band: 0.03
      informative_weight: 5.0
      min_dates: 3

  # Local-LLM bot (requires the `llm` extra + a running local model).
  # Trades the long tail the deterministic bots can't link, by reasoning about the
  # underlying quantity. qwen3:8b won the local forecasting benchmark.
  - name: llm_forecaster
    strategy: llm
    account_env: MANIFOLD_CLONE_API_KEY
    enabled: true
    limits:
      max_order_size: 20
      hold_band: 0.05
      max_run_budget: 150
    params:
      model: qwen3:32b    # benchmark winner: best calibration (71% coverage)
      spread_mult: 1.25   # less widening needed than 8b (32b is better calibrated)
      conf_cap: 0.75      # never bet >75% conviction (obscure markets -> hallucination risk)
      max_groups: 12      # cap LLM calls per run (~50s each on 32b)

  # === COSMETIC DEMO COVERAGE (local LLM) — the cocoa/coffee "50% sea" ===
  # These quantity/demand markets have NO fundamental data source (cocoa isn't in
  # FAS PSD; coffee has no price markets) and ~never resolve, so no anchored bot can
  # price them. This bot uses the LOCAL LLM to reason a fair value per measurable
  # ladder purely so the markets move off 0.50 for the demo. It is NOT an alpha bot:
  # targets cancel-prone markets (capital-neutral, ~zero expected PnL); kept tiny.
  # Scoped to cocoa/coffee and EXCLUDES price markets (other bots own those).
  # enabled:false; the full run is slow (~50s/ladder on 32b) — run on demand to
  # populate the demo. Mint @LlmAgCoverageBot at go-live; dry-run via an existing key.
  - name: llm_ag_coverage
    strategy: llm
    account_env: LLM_AG_COVERAGE_API_KEY
    enabled: false
    limits:
      max_order_size: 12        # tiny: just nudge off 0.50, don't slam
      liquidity_pct: 0.15
      hold_band: 0.05
      min_ev: 0.0               # cosmetic coverage: do not gate on EV
      min_resolvability: 0.0    # deliberately trade the non-resolving sea (capital-neutral)
      max_run_budget: 3000
      max_total_exposure: 6000
      dry_run_sample: 25
    params:
      model: gemma4:latest      # small/fast (8B, ~11s/ladder) — quality irrelevant for cosmetic
      spread_mult: 1.5          # wider bands: these are obscure quantities -> stay humble
      conf_cap: 0.70
      max_groups: 60            # cover the cocoa/coffee ladders in one run
      include_terms: ["cocoa", "coffee"]
      exclude_terms: ["price", "futures", "basis", "spread", "cents/lb", "USD/t", "/mt", "nearest-futures"]
      no_think: false           # gemma has no thinking mode (qwen3-only knob)
      num_ctx: 6144             # small context: these prompts are short; 32K just slows prefill
      timeout: 75               # cap per-ladder time; a slow ladder abstains (stays 0.50) fast

  # === Market-maker (maker MODE — Phase 4) ===
  # `maker: true` switches EXECUTION only: instead of taker market orders, the
  # runner posts two-sided RESTING limit quotes around this bot's own fair value
  # (here commodity_spot's), with fill reconciliation. Any calibrated anchor becomes
  # a liquidity provider on its own account by adding `maker: true` — no wrapper
  # strategy, no separate bot. `quantbots run --bot market_maker_1` auto-routes to
  # the maker path. Maker knobs live in `limits`. See docs/market-maker.md.
  # NOTE: enabled:false + NOT in daily_cycle.sh until a human confirms go-live.
  # Live-canary verified 2026-06-01 (@MarketMakerBot). Overlaps commodity_spot_1 on
  # the same legs — disable commodity_spot on dislocated legs before full deploy, or
  # flip commodity_spot_1 itself to maker:true and retire this bot.
  - name: market_maker_1
    strategy: commodity_spot      # the fair-value source (the anchor itself)
    account_env: MARKET_MAKER_1_API_KEY   # own account: @MarketMakerBot
    enabled: false
    maker: true                   # execute as a maker (limit-capped resting quotes)
    limits:
      max_order_size: 50       # per-leg hard ceiling
      liquidity_pct: 0.25      # size each leg to <=1/4 of market liquidity
      min_order_mana: 5
      min_resolvability: 0.04  # only quote markets that actually settle YES/NO
      max_run_budget: 5000     # max mana reserved across all quotes per cycle
      max_total_exposure: 10000  # cap cumulative FILLED inventory mana (~3% of balance)
      per_group_pct: 0.30      # no single commodity gets >30% of the cycle reserve
      max_group_exposure: 2000   # hard mana cap on quotes per commodity
      dry_run_sample: 25
      # --- maker execution knobs ---
      half_spread: 0.04        # quote at fair ± 4 points
      min_half_spread: 0.02    # never tighter than 2 points (whole-percent floor)
      inventory_cap: 200       # |net YES shares| per market before one-sided quoting
      quote_ttl_hours: 25      # TTL backstop (slightly over daily cadence)
      max_markets: 10          # breadth cap: quote the 10 most liquid priced markets
    params:                    # forwarded to the commodity_spot source — use the
      min_vol: 0.05            # SAME calibrated vols as commodity_spot_1 so the
      vols:                    # maker prices off the tuned model, not catalog defaults
        GOLD: 0.16
        SILVER: 0.30
        PLATINUM: 0.22
        PALLADIUM: 0.30
        COPPER: 0.21
        WTI_OIL: 0.40
        BRENT_OIL: 0.39
        GASOLINE: 0.45

  # === USDA soft-commodity bots (cotton / cocoa / coffee) — see docs/usda-softs-bots.md ===
  # All three start enabled:false (dry-run only) and are NOT in daily_cycle.sh until
  # validated live. Run `quantbots ingest` (fas_psd + nass) before running these.
  # Mint dedicated accounts before go-live; for a dry-run, point account_env at an
  # existing key (e.g. COMMODITY_SPOT_1_API_KEY).

  # Cotton FAS bot (SINGLE SOURCE = USDA FAS PSD). Prices cotton futures threshold
  # markets by drifting the live futures anchor toward the fundamental fair value
  # (SIG_COTTON_FAS, computed in processing/signals.py). Refactor of the earlier
  # blended cotton bot — NASS is now its own bot (nass_cotton_1). LIVE since 2026-06-01.
  - name: cotton_fundamental_1
    strategy: fas_fundamental
    account_env: COTTON_FUNDAMENTAL_1_API_KEY   # own account: @Cottonfundamental1 (minted 2026-06-01, Ṁ100k)
    enabled: true
    limits:
      max_order_size: 3000
      liquidity_pct: 1.0
      max_price_impact: 0.60
      hold_band: 0.05
      max_run_budget: 60000
      per_group_pct: 1.0
      min_ev: 0.05
      min_resolvability: 0.04
      max_total_exposure: 60000
      max_group_exposure: 60000
      dry_run_sample: 25
      llm_comments: true         # local qwen3 writes the trade rationale (fallback: deterministic)
    params:
      reversion_rate: 0.5
      drift_cap: 0.05            # the R^2~0.03 fit cannot justify more than a small tilt
      max_horizon_years: 4.0     # cover far-dated cotton price markets (2029/2030)
      min_drift: 0.003           # meaningful-trade gate: abstain on negligible drift

  # Cotton NASS bot (SINGLE SOURCE = USDA NASS crop condition). Needs NASS_API_KEY;
  # abstains entirely without it. enabled:false until validated + account minted.
  - name: nass_cotton_1
    strategy: nass_crop
    account_env: NASS_COTTON_1_API_KEY   # own account: @Nasscotton1 (minted 2026-06-01, Ṁ100k)
    enabled: true    # LIVE 2026-06-01 (abstains until NASS_API_KEY is set)
    limits:
      max_order_size: 1000
      liquidity_pct: 0.5
      max_price_impact: 0.30
      hold_band: 0.05
      min_ev: 0.05
      min_resolvability: 0.04
      max_run_budget: 20000
      max_total_exposure: 20000
      max_group_exposure: 20000
      dry_run_sample: 25
      llm_comments: true
      llm_model: mercury-2     # hosted (Inception) — COMMENTS ONLY; alpha stays local
    params:
      cond_ref: 50.0
      drift_cap: 0.05
      max_horizon_years: 4.0

  # CFTC positioning bot (SINGLE SOURCE = CFTC COT). Fades managed-money extremes on
  # BOTH cotton and cocoa price markets (one source, multiple commodities is fine).
  - name: cftc_softs_1
    strategy: cftc_positioning
    account_env: CFTC_SOFTS_1_API_KEY   # own account: @Cftcsofts1 (minted 2026-06-01, Ṁ100k)
    enabled: true    # LIVE 2026-06-01
    limits:
      max_order_size: 1000
      liquidity_pct: 0.5
      max_price_impact: 0.30
      hold_band: 0.05
      per_group_pct: 0.6
      min_ev: 0.05
      min_resolvability: 0.04
      max_run_budget: 20000
      max_total_exposure: 20000
      max_group_exposure: 12000
      dry_run_sample: 25
      llm_comments: true
      llm_model: mercury-2     # hosted (Inception) — COMMENTS ONLY; alpha stays local
    params:
      k: 0.04
      min_z: 1.0
      drift_cap: 0.08
      max_horizon_years: 4.0     # cover far-dated cotton+cocoa price markets

  # Weather bot (SINGLE SOURCE = open-meteo). Drifts cocoa price markets on Ivory
  # Coast cocoa-belt drought anomalies.
  - name: weather_cocoa_1
    strategy: weather_anomaly
    account_env: WEATHER_COCOA_1_API_KEY   # own account: @Weathercocoa1 (minted 2026-06-01, Ṁ100k)
    enabled: true    # LIVE 2026-06-01
    limits:
      max_order_size: 1000
      liquidity_pct: 0.5
