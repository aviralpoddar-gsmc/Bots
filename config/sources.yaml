# External data sources to ingest. `quantbots ingest` fetches each enabled
# source and caches the observations in the store for strategies to read.
#
# - name:    a source registered in quantbots/sources/__init__.py REGISTRY
# - params:  passed as **kwargs to the Source constructor

sources:
  # Commodities / FX / indices / equities (keyless).
  # Equity tickers use entity STOCK_<TICKER> with stooq symbol <ticker>.us, which
  # the linker maps to automatically from "(TICKER) stock price" questions.
  - name: stooq
    enabled: true
    params:
      symbols:
        WTI_OIL: cl.f
        BRENT_OIL: cb.f
        GOLD: gc.f
        SILVER: si.f
        COPPER: hg.f
        NATGAS: ng.f
        # commodity_spot bot (verified units): platinum/palladium $/oz, RBOB $/gal.
        PLATINUM: pl.f
        PALLADIUM: pa.f
        GASOLINE: rb.f
        STOCK_WULF: wulf.us
        # Soft-commodity futures (for the commodity_futures bot).
        CME_COTTON: ct.f
        CME_SUGAR: sb.f
        CME_CORN: zc.f
        CME_WHEAT: zw.f
        CME_COCOA: cc.f

  # US macro series (keyless FRED CSV). entity FRED_<SERIESID>.
  - name: fred
    enabled: true
    params:
      series:
        - { entity: FRED_MORTGAGE30US, id: MORTGAGE30US }
        - { entity: FRED_HOUST1F, id: HOUST1F }

  # Climate indices — ENSO / Oceanic Niño Index (keyless NOAA CPC ascii).
  - name: noaa
    enabled: true
    params: {}

  # Macro / economic indicators (keyless).
  - name: worldbank
    enabled: true
    params:
      indicators:
        - { entity: US_CPI_YOY, country: US, code: FP.CPI.TOTL.ZG }
        - { entity: US_GDP_GROWTH, country: US, code: NY.GDP.MKTP.KD.ZG }
        - { entity: US_UNEMPLOYMENT, country: US, code: SL.UEM.TOTL.ZS }

  # News / text feeds (keyless). Add commodity/macro RSS feeds here.
  - name: rss
    enabled: true
    params:
      max_items: 30
      feeds:
        - { entity: EIA_TODAY_IN_ENERGY, url: "https://www.eia.gov/rss/todayinenergy.xml" }

  # USDA FAS PSD world supply/demand (keyless bulk CSV). Emits
  # PSD_COTTON_FREE_SUR (ex-China stocks-to-use), PSD_COTTON_SUR,
  # PSD_COFFEE_CONS, PSD_COFFEE_CONS_GROWTH. Drives the cotton + coffee bots.
  - name: fas_psd
    enabled: true
    params:
      max_age_hours: 24
      commodities: [cotton, coffee]

  # USDA NASS QuickStats (keyed — set NASS_API_KEY; skipped gracefully if absent).
  # Single signal source for the nass_crop bot (US cotton crop condition).
  - name: nass
    enabled: true
    params:
      series:
        - entity: NASS_COTTON_COND_GE
          agg_level_desc: NATIONAL
          sum_short_desc:
            - "COTTON - CONDITION, MEASURED IN PCT GOOD"
            - "COTTON - CONDITION, MEASURED IN PCT EXCELLENT"

  # CFTC Commitments of Traders (keyless). Single signal source for cftc_positioning.
  - name: cftc
    enabled: true
    params:
      commodities: [cotton, cocoa, coffee]

  # Growing-region weather (keyless open-meteo). Single signal source for weather_anomaly.
  - name: weather
    enabled: true
    params:
      regions:
        - { key: COCOA_CI, lat: 6.8, lon: -5.3 }
        - { key: COFFEE_BR, lat: -21.0, lon: -45.0 }
