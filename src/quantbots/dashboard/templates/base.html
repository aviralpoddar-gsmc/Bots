<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Bot Operations · quantbots{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    // Strict monochrome theme. No saturated colors anywhere; semantic state uses
    // weight + a single graphite accent for warnings.
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            ink: {
              0:   '#FFFFFF',   // page bg
              50:  '#FAFAFA',   // subtle zebra
              100: '#F5F5F5',   // card bg alt
              150: '#EAEAEA',   // borders
              300: '#9A9A9A',   // muted metadata
              500: '#666666',   // secondary
              700: '#3A3A3A',   // emphasis
              900: '#0F0F0F',   // primary
            },
            warn: '#444444',   // single allowed accent: deep graphite
          },
          borderRadius: { 'card': '18px' },
        },
      },
    };
  </script>
  <style>
    :root { color-scheme: light; }
    body {
      background: #FFFFFF;
      color: #0F0F0F;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.005em;
    }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .label { text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; color: #9A9A9A; font-weight: 600; }
    .card { background: #FFFFFF; border: 1px solid #EAEAEA; border-radius: 18px; }
    .card-flat { background: #FFFFFF; border: 1px solid #EAEAEA; border-radius: 12px; }
    .hairline { border-color: #EAEAEA; }
    .hairline-b { border-bottom: 1px solid #EAEAEA; }
    .hairline-t { border-top: 1px solid #EAEAEA; }
    .hairline-r { border-right: 1px solid #EAEAEA; }
    .divider { height: 1px; background: #EAEAEA; }
    .pos-arrow::before { content: "↑"; margin-right: 4px; color: #0F0F0F; font-weight: 700; }
    .neg-arrow::before { content: "↓"; margin-right: 4px; color: #666666; font-weight: 700; }
    .flat-arrow::before { content: "·"; margin-right: 4px; color: #9A9A9A; }
    .pos { color: #0F0F0F; }
    .neg { color: #666666; }
    .neu { color: #9A9A9A; }
    /* Badges: hollow outlines, monochrome */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 8px; font-size: 10.5px; font-weight: 600;
      border: 1px solid #EAEAEA; border-radius: 4px;
      color: #3A3A3A; letter-spacing: 0.04em;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
    }
    .badge-solid { background: #0F0F0F; color: #FFFFFF; border-color: #0F0F0F; }
    .badge-dot::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
    /* Status badges */
    .status-live    { color: #0F0F0F; background: transparent; border-color: #0F0F0F; }
    .status-paused  { color: #666666; background: transparent; border-color: #C8C8C8; }
    .status-off     { color: #9A9A9A; background: #F5F5F5; border-color: #EAEAEA; }
    .status-warn    { color: #444444; background: transparent; border-color: #444444; }
    /* Quiet table */
    table.matrix { border-collapse: separate; border-spacing: 0; }
    table.matrix thead th {
      text-transform: uppercase; letter-spacing: 0.08em; font-size: 10.5px;
      font-weight: 600; color: #9A9A9A;
      border-bottom: 1px solid #EAEAEA;
      padding: 10px 12px;
    }
    table.matrix tbody td {
      padding: 12px;
      border-bottom: 1px solid #F5F5F5;
      font-size: 13.5px;
    }
    table.matrix tbody tr:hover { background: #FAFAFA; }
    table.matrix tbody tr:last-child td { border-bottom: none; }
    /* Sparkbar */
    .sparkbar { height: 4px; background: #F5F5F5; border-radius: 999px; overflow: hidden; }
    .sparkbar > div { height: 100%; background: #0F0F0F; border-radius: 999px; }
    /* Subtle button */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; font-size: 12px; font-weight: 500;
      color: #3A3A3A; background: #FFFFFF; border: 1px solid #EAEAEA;
      border-radius: 8px; transition: background 100ms ease, border-color 100ms ease;
    }
    .btn:hover { background: #FAFAFA; border-color: #C8C8C8; color: #0F0F0F; }
    /* Subtle live dot — single pulse using monochrome */
    .live-dot { width: 6px; height: 6px; border-radius: 999px; background: #0F0F0F; box-shadow: 0 0 0 0 rgba(15,15,15,0.4); animation: livepulse 2.4s infinite; }
    @keyframes livepulse {
      0% { box-shadow: 0 0 0 0 rgba(15,15,15,0.25); }
      70% { box-shadow: 0 0 0 6px rgba(15,15,15,0); }
      100% { box-shadow: 0 0 0 0 rgba(15,15,15,0); }
    }
    /* Scrollbars */
    .scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .scroll::-webkit-scrollbar-thumb { background: #EAEAEA; border-radius: 999px; }
    .scroll::-webkit-scrollbar-thumb:hover { background: #C8C8C8; }
    /* Disclosure */
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
    /* Allocation bar (strategy distribution) */
    .allocbar { display: flex; height: 8px; background: #F5F5F5; border-radius: 4px; overflow: hidden; }
    .allocbar > div + div { border-left: 1px solid #FFFFFF; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  <script>
    // Soft polling — keep this dead simple.
    setTimeout(() => location.reload(), 60000);
  </script>
</body>
</html>
