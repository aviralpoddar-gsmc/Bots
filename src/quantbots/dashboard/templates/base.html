<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}quantbots · dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            bg: {
              base: '#06080d',
              elev: '#0d1018',
              card: '#11141e',
              soft: '#161a26',
            },
            line: {
              DEFAULT: '#1d2230',
              soft: '#161a26',
              hover: '#2c3243',
            },
            ink: {
              50:  '#f4f6fc',
              100: '#e9ecf5',
              200: '#cdd2e2',
              300: '#a3aac0',
              400: '#777e94',
              500: '#5a6178',
              600: '#3f4458',
              700: '#2b2f3f',
            },
            up:   { 400: '#4ade80', 500: '#22c55e' },
            down: { 400: '#fb7185', 500: '#f43f5e' },
            acc:  { indigo: '#818cf8', pink: '#ec4899', amber: '#fbbf24' },
          },
        },
      },
    };
  </script>
  <style>
    :root { color-scheme: dark; }
    body {
      background: radial-gradient(1200px 600px at 50% -100px, rgba(129,140,248,0.06), transparent),
                  radial-gradient(800px 500px at 100% 100%, rgba(236,72,153,0.04), transparent),
                  #06080d;
      color: #e9ecf5;
      font-family: 'Inter', system-ui, sans-serif;
      font-feature-settings: 'cv11', 'ss01';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
    .label { text-transform: uppercase; letter-spacing: 0.12em; font-size: 10px; color: #5a6178; font-weight: 600; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.015) 0%, rgba(255,255,255,0) 100%), #11141e;
      border: 1px solid #1d2230;
      border-radius: 16px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 12px 32px rgba(0,0,0,0.25);
    }
    .card-soft { background: #11141e; border: 1px solid #1d2230; border-radius: 12px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; padding: 3px 9px; border-radius: 999px;
      font-weight: 600; letter-spacing: 0.02em;
      border: 1px solid transparent;
    }
    .chip-live   { background: rgba(34,197,94,0.12);  color: #86efac; border-color: rgba(34,197,94,0.25); }
    .chip-off    { background: rgba(120,128,150,0.12); color: #a3aac0; border-color: rgba(120,128,150,0.25); }
    .chip-strat  { background: rgba(129,140,248,0.12); color: #c7d2fe; border-color: rgba(129,140,248,0.25); font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; }
    .chip-yes    { background: rgba(34,197,94,0.12);  color: #86efac; border-color: rgba(34,197,94,0.2); }
    .chip-no     { background: rgba(244,63,94,0.12);  color: #fda4af; border-color: rgba(244,63,94,0.2); }
    .chip-amber  { background: rgba(251,191,36,0.10); color: #fcd34d; border-color: rgba(251,191,36,0.2); }
    .pos { color: #4ade80; }
    .neg { color: #fb7185; }
    .neu { color: #a3aac0; }
    .accent-text { background: linear-gradient(120deg, #818cf8 0%, #ec4899 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, #1d2230, transparent); }
    .pulse { width: 8px; height: 8px; border-radius: 999px; background: #22c55e; box-shadow: 0 0 0 0 rgba(34,197,94,0.6); animation: pulse 2s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.45); }
      70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .scroll::-webkit-scrollbar-thumb { background: #2c3243; border-radius: 999px; }
    .bar-bg { background: rgba(255,255,255,0.04); }
    /* Bar inside a leaderboard PnL cell */
    .pnl-bar {
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      height: 60%; border-radius: 4px;
      pointer-events: none; opacity: 0.18;
    }
    .pnl-bar.pos { background: linear-gradient(90deg, transparent, #22c55e); }
    .pnl-bar.neg { background: linear-gradient(90deg, transparent, #f43f5e); }
    /* Card hover */
    .botcard { transition: border-color 150ms ease, transform 150ms ease; }
    .botcard:hover { border-color: #2c3243; }
    /* Subtle table row hover */
    tr.hoverable { transition: background 100ms ease; }
    tr.hoverable:hover { background: rgba(255,255,255,0.025); }
    details > summary { list-style: none; cursor: pointer; }
    details > summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="min-h-screen">
  {# === Sticky top nav === #}
  <nav class="sticky top-0 z-30 backdrop-blur-md bg-bg-base/80 border-b border-line">
    <div class="max-w-[1480px] mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-acc-indigo to-acc-pink flex items-center justify-center font-bold text-sm">q</div>
        <h1 class="text-lg font-bold tracking-tight">
          <span class="accent-text">quantbots</span>
          <span class="text-ink-500 font-medium text-sm ml-2">dashboard</span>
        </h1>
      </div>
      <div class="flex items-center gap-5 text-sm">
        {% if account %}
          <div class="flex items-center gap-2 text-ink-300">
            <div class="pulse"></div>
            <span class="text-ink-500">@</span>
            <span class="font-semibold text-ink-100">{{ account.username }}</span>
          </div>
          <div class="num text-ink-100 font-semibold text-base">Ṁ{{ '{:,.0f}'.format(account.balance) }}</div>
        {% endif %}
        <div class="text-ink-500 text-xs hidden md:block">refreshed {{ refreshed_at }}</div>
        <button onclick="location.reload()" class="px-3 py-1.5 rounded-lg bg-bg-soft hover:bg-bg-card border border-line hover:border-line-hover text-xs font-medium transition">↻</button>
      </div>
    </div>
  </nav>

  <main class="max-w-[1480px] mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-[1480px] mx-auto px-6 pb-10 text-center text-ink-600 text-xs">
    auto-refresh every 60s · reads from <span class="num">data/quantbots.sqlite</span> · ▲ {{ refreshed_at }}
  </footer>

  <script>
    // Soft polling — full reload keeps the implementation tiny.
    setTimeout(() => location.reload(), 60000);
  </script>
</body>
</html>
