<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}quantbots{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            bg: { 950: '#0a0c12', 900: '#0f1219', 800: '#161a25', 700: '#1f2433' },
            border: { DEFAULT: '#252b3d', soft: '#1c2030' },
            ink: { 50: '#f8f9fc', 100: '#e2e6f0', 300: '#9aa3b8', 500: '#6b7387', 700: '#4a5163' },
          },
        },
      },
    };
  </script>
  <style>
    body { background-color: #0a0c12; color: #e2e6f0; font-family: 'Inter', system-ui, sans-serif; }
    .num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .card { background: linear-gradient(180deg, #161a25 0%, #131724 100%); border: 1px solid #252b3d; border-radius: 14px; }
    .chip { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; letter-spacing: 0.02em; }
    .pos { color: #34d399; }
    .neg { color: #f87171; }
    .neut { color: #94a3b8; }
    .accent { background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
    table.tight td, table.tight th { padding-top: 6px; padding-bottom: 6px; }
    .scrollshadow { mask-image: linear-gradient(to bottom, black 90%, transparent); }
    /* Subtle hover lift on bot cards */
    .botcard { transition: transform 120ms ease, border-color 120ms ease; }
    .botcard:hover { transform: translateY(-1px); border-color: #3b4358; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-[1500px] mx-auto px-6 py-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-baseline gap-3">
        <h1 class="text-2xl font-bold tracking-tight">
          <span class="accent">quantbots</span>
        </h1>
        <span class="text-ink-500 text-sm">dashboard</span>
      </div>
      <div class="flex items-center gap-4 text-sm text-ink-300">
        {% if account %}
          <div>
            <span class="text-ink-500">@</span><span class="font-medium">{{ account.username }}</span>
          </div>
          <div class="num text-ink-100">Ṁ{{ '{:,.0f}'.format(account.balance) }}</div>
        {% endif %}
        <div class="text-ink-500">refreshed {{ refreshed_at }}</div>
        <button onclick="location.reload()" class="px-3 py-1.5 rounded-lg bg-bg-800 hover:bg-bg-700 border border-border text-xs">Refresh</button>
      </div>
    </header>
    {% block content %}{% endblock %}
    <footer class="mt-12 text-center text-ink-700 text-xs">
      auto-refresh every 60s · reads from
      <span class="font-mono">data/quantbots.sqlite</span>
    </footer>
  </div>
  <script>
    // Cheap polling refresh — keeps the UI fresh without a full SPA.
    setTimeout(() => location.reload(), 60000);
  </script>
</body>
</html>
